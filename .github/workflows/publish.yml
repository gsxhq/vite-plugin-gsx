name: Publish

# Publishes releases created outside the Release workflow. The Release workflow
# publishes directly because GitHub suppresses release-triggered workflows when
# the release is created with GITHUB_TOKEN.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run typecheck
      - run: npm run typecheck:example
      - run: npm run build
      - run: npm test
      - run: npm publish
