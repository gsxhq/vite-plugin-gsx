name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump: patch, minor, major, or an explicit version like 0.4.2"
        required: true
        default: patch

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run typecheck
      - run: npm run typecheck:example
      - run: npm run build
      - run: npm test
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Bump version
        run: npm version "${{ inputs.version }}" --no-git-tag-version
      - name: Read version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Check npm version is available
        run: |
          if npm view "@gsxhq/vite-plugin-gsx@${{ steps.version.outputs.version }}" version >/dev/null 2>&1; then
            echo "@gsxhq/vite-plugin-gsx@${{ steps.version.outputs.version }} is already published" >&2
            exit 1
          fi
      - name: Commit and tag
        run: |
          git add package.json package-lock.json
          git commit -m "Release vite plugin v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
      - name: Push commit and tag
        run: |
          git push origin HEAD:main
          git push origin "v${{ steps.version.outputs.version }}"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes "Release @gsxhq/vite-plugin-gsx v${{ steps.version.outputs.version }}."
